<style>
.latest-titles-section {
  text-align: center;
  padding: 30px 20px;
  background: #f3f3f3;
}

.latest-titles-heading {
  font-family: Arial, sans-serif;
  font-size: 2rem;
  font-weight: 700;
  color: #666;
  margin-bottom: 20px;
}

.book-carousel {
  position: relative;
  max-width: 340px;
  margin: 0 auto;
}

.carousel-track-wrapper {
  width: 100%;
  overflow: hidden;
}

.carousel-track {
  width: 100%;
}

.book-slide {
  display: none;
  text-decoration: none;
}

.book-slide.active {
  display: block;
}

.book-slide img {
  width: 100%;
  max-width: 340px;
  height: auto;
  display: block;
  margin: 0 auto;
  border-radius: 4px;
}

.carousel-arrow {
  background: rgba(180,180,180,0.35);
  border: none;
  color: white;
  font-size: 24px;
  width: 46px;
  height: 46px;
  border-radius: 50%;
  cursor: pointer;
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
}

.carousel-arrow.prev {
  left: -60px;
}

.carousel-arrow.next {
  right: -60px;
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function () {
  let currentSlide = 0;
  const slides = document.querySelectorAll(".book-slide");

  function showSlide(index) {
    slides.forEach(slide => slide.classList.remove("active"));

    if (index &gt;= slides.length) {
      currentSlide = 0;
    } else if (index &lt; 0) {
      currentSlide = slides.length - 1;
    } else {
      currentSlide = index;
    }

    if (slides.length &gt; 0) {
      slides[currentSlide].classList.add("active");
    }
  }

  window.moveSlide = function(direction) {
    showSlide(currentSlide + direction);
  };

  showSlide(currentSlide);
});
</script>
