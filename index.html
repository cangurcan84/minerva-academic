<style>
.book-slider {
  position: relative;
  max-width: 240px;
  margin: 0 auto;
}

.book-slider input[type="radio"] {
  display: none;
}

.slides {
  position: relative;
}

.slide {
  display: none;
}

.slide img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 6px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
}

#slide1:checked ~ .slides .s1 {
  display: block;
}

#slide2:checked ~ .slides .s2 {
  display: block;
}

.book-nav {
  display: none;
}

#slide1:checked ~ .book-nav-for-slide1 {
  display: block;
}

#slide2:checked ~ .book-nav-for-slide2 {
  display: block;
}

.arrow {
  position: absolute;
  top: 42%;
  transform: translateY(-50%);
  width: 52px;
  height: 52px;
  line-height: 52px;
  text-align: center;
  font-size: 30px;
  color: #fff;
  background: rgba(0,0,0,0.28);
  border-radius: 50%;
  cursor: pointer;
  user-select: none;
  font-family: Arial, sans-serif;
}

.arrow.left {
  left: -70px;
}

.arrow.right {
  right: -70px;
}

.arrow:hover {
  background: rgba(0,0,0,0.45);
}

.dots {
  margin-top: 14px;
  display: flex;
  justify-content: center;
  gap: 10px;
}

.dot {
  width: 12px;
  height: 12px;
  background: #bbb;
  border-radius: 50%;
  display: inline-block;
  cursor: pointer;
}

#slide1:checked ~ .dots label[for="slide1"],
#slide2:checked ~ .dots label[for="slide2"] {
  background: #666;
}

@media (max-width: 768px) {
  .book-slider {
    max-width: 190px;
  }

  .arrow.left {
    left: -25px;
  }

  .arrow.right {
    right: -25px;
  }
}
</style>
